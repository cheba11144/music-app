<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Music App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #12121a);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.search {
    padding: 10px;
    display: flex;
    justify-content: center;
}

.search input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

.playlist {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.track {
    padding: 15px;
    margin-bottom: 8px;
    background: #2b2b3d;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.track:hover {
    background: #3b3b55;
}

.active {
    background: #4e5bff !important;
}

.player {
    padding: 15px;
    background: #1a1a25;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.controls {
    margin-top: 10px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    background: #4e5bff;
    color: white;
}

button:hover {
    background: #6c78ff;
}

audio {
    width: 100%;
}
</style>
</head>

<body>

<div class="header">🎵 My Music</div>

<div class="search">
    <input type="text" id="searchInput" placeholder="Поиск трека...">
</div>

<div class="playlist" id="playlist"></div>

<div class="player">
    <div id="currentTrack">Ничего не играет</div>
    <audio id="audio" controls></audio>

    <div class="controls">
        <button onclick="prevTrack()">⏮</button>
        <button onclick="toggleShuffle()">🔀</button>
        <button onclick="nextTrack()">⏭</button>
    </div>
</div>

let currentIndex = -1;
let shuffle = false;

const playlist = document.getElementById("playlist");
const audio = document.getElementById("audio");
const currentTrackText = document.getElementById("currentTrack");
const searchInput = document.getElementById("searchInput");

function renderPlaylist(filter="") {
    playlist.innerHTML = "";

    tracks
        .filter(track => track.name.toLowerCase().includes(filter.toLowerCase()))
        .forEach((track, index) => {
            let div = document.createElement("div");
            div.className = "track";
            div.innerText = track.name;
            div.onclick = () => playTrack(index);
            if(index === currentIndex) div.classList.add("active");
            playlist.appendChild(div);
        });
}

function playTrack(index) {
    currentIndex = index;
    audio.src = tracks[index].file;
    audio.play();
    currentTrackText.innerText = "Сейчас играет: " + tracks[index].name;
    renderPlaylist(searchInput.value);
}

function nextTrack() {
    if (shuffle) {
        currentIndex = Math.floor(Math.random() * tracks.length);
    } else {
        currentIndex = (currentIndex + 1) % tracks.length;
    }
    playTrack(currentIndex);
}

function prevTrack() {
    currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
    playTrack(currentIndex);
}

function toggleShuffle() {
    shuffle = !shuffle;
    alert("Shuffle: " + (shuffle ? "ВКЛ" : "ВЫКЛ"));
}

audio.addEventListener("ended", nextTrack);

searchInput.addEventListener("input", (e) => {
    renderPlaylist(e.target.value);
});

renderPlaylist();
</script>
