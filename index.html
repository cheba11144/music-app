<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Music</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#181622,#0f0d16);
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

.search{
    padding:10px;
    display:flex;
    justify-content:center;
}

.search input{
    width:90%;
    padding:12px;
    border-radius:12px;
    border:none;
    font-size:15px;
    background:#232033;
    color:white;
}

.playlist{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.track{
    padding:14px;
    margin-bottom:8px;
    background:#232033;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.track:hover{
    background:#2f2a44;
}

.active{
    background:#4c3a7a !important;
}

.player{
    padding:15px;
    background:#14121c;
    display:flex;
    flex-direction:column;
}

#currentTrack{
    text-align:center;
    margin-bottom:10px;
    font-size:14px;
}

.progress-container{
    width:100%;
    height:6px;
    background:#2c273f;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:8px;
}

.progress{
    height:100%;
    width:0%;
    background:#7a5cff;
    border-radius:5px;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:12px;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    position:relative;
}

button{
    background:#2c2544;
    border:none;
    color:white;
    padding:12px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#3a2f5f;
    transform:scale(1.08);
}

.random-active{
    background:#5e45b8;
}

.volume-wrapper{
    position:relative;
}

.volume-popup{
    position:absolute;
    bottom:55px;
    left:50%;
    transform:translateX(-50%);
    background:#1e1a2e;
    padding:10px;
    border-radius:12px;
    display:none;
}

.volume-wrapper:hover .volume-popup{
    display:block;
}

#volumeSlider{
    writing-mode:bt-lr;
    appearance:slider-vertical;
    width:6px;
    height:120px;
}

/* 📱 АДАПТАЦИЯ */

@media(max-width:768px){

    .controls{
        gap:10px;
    }

    button{
        padding:14px;
        font-size:20px;
    }

    .volume-popup{
        bottom:65px;
    }

}

</style>
</head>
<body>

<div class="header">
    🎵 My Music
    <button id="addBtn" style="margin-left:10px;font-size:16px;">➕</button>
</div>

<input type="file" id="fileInput" accept="audio/mp3" multiple style="display:none;">

<div class="search">
<input type="text" id="searchInput" placeholder="Поиск трека...">
</div>

<div class="playlist" id="playlist"></div>

<div class="player">

<div id="currentTrack">Ничего не играет</div>

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">

<div class="volume-wrapper">
<button id="volumeBtn">🔊</button>
<div class="volume-popup">
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
</div>
</div>

<button id="prevBtn">⏮</button>
<button id="pauseBtn">▶</button>
<button id="nextBtn">⏭</button>
<button id="shuffleBtn">🔀</button>

</div>

<audio id="audio"></audio>

</div>

let currentIndex=-1;
let shuffle=false;

const playlist=document.getElementById("playlist");
const audio=document.getElementById("audio");
const searchInput=document.getElementById("searchInput");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const currentTimeEl=document.getElementById("currentTime");
const durationEl=document.getElementById("duration");
const pauseBtn=document.getElementById("pauseBtn");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const shuffleBtn=document.getElementById("shuffleBtn");
const volumeSlider=document.getElementById("volumeSlider");
const volumeBtn=document.getElementById("volumeBtn");
const currentTrackText=document.getElementById("currentTrack");

function renderPlaylist(filter = "") {
    playlist.innerHTML = "";

    const filteredTracks = tracks.filter(track =>
        track.name.toLowerCase().includes(filter.toLowerCase())
    );

    filteredTracks.forEach(track => {

        const realIndex = tracks.indexOf(track);

        let div = document.createElement("div");
        div.className = "track";
        div.innerText = track.name;

        div.onclick = () => playTrack(realIndex);

        if (realIndex === currentIndex)
            div.classList.add("active");

        playlist.appendChild(div);
    });
}

function playTrack(index){
    currentIndex = index;
    audio.src = tracks[index].file;
    audio.play();
    pauseBtn.textContent = "⏸";

    const fullName = tracks[index].name;

    let artist = "";
    let title = fullName;

    if(fullName.includes(" - ")){
        const parts = fullName.split(" - ");
        artist = parts[0];
        title = parts.slice(1).join(" - ");
    }

    currentTrackText.innerHTML = `
        <div style="font-weight:600;">${title}</div>
        <div style="font-size:12px;opacity:.6;margin-top:4px;">${artist}</div>
    `;

    // ✅ Media Session
    if ('mediaSession' in navigator) {

        navigator.mediaSession.metadata = new MediaMetadata({
            title: title,
            artist: artist,
            album: "My Music"
        });

        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);

        navigator.mediaSession.setActionHandler('play', () => {
            audio.play();
            pauseBtn.textContent = "⏸";
        });

        navigator.mediaSession.setActionHandler('pause', () => {
            audio.pause();
            pauseBtn.textContent = "▶";
        });
    }

    renderPlaylist(searchInput.value);
}

pauseBtn.addEventListener("click",()=>{
if(audio.paused){
audio.play();
pauseBtn.textContent="⏸";
}else{
audio.pause();
pauseBtn.textContent="▶";
}
});

nextBtn.addEventListener("click",nextTrack);
prevBtn.addEventListener("click",prevTrack);

function nextTrack(){
if(shuffle){
currentIndex=Math.floor(Math.random()*tracks.length);
}else{
currentIndex=(currentIndex+1)%tracks.length;
}
playTrack(currentIndex);
}

function prevTrack(){
currentIndex=(currentIndex-1+tracks.length)%tracks.length;
playTrack(currentIndex);
}

shuffleBtn.addEventListener("click",()=>{
shuffle=!shuffle;
shuffleBtn.classList.toggle("random-active");
});

audio.addEventListener("timeupdate",()=>{
if(audio.duration){
let percent=(audio.currentTime/audio.duration)*100;
progress.style.width=percent+"%";
currentTimeEl.textContent=formatTime(audio.currentTime);
durationEl.textContent=formatTime(audio.duration);
}
});

progressContainer.addEventListener("click",(e)=>{
let width=progressContainer.clientWidth;
let clickX=e.offsetX;
audio.currentTime=(clickX/width)*audio.duration;
});

audio.addEventListener("ended",nextTrack);

volumeSlider.addEventListener("input",()=>{
audio.volume=volumeSlider.value;

if(audio.volume==0)volumeBtn.textContent="🔇";
else if(audio.volume<0.5)volumeBtn.textContent="🔉";
else volumeBtn.textContent="🔊";
});

searchInput.addEventListener("input",(e)=>{
renderPlaylist(e.target.value);
});

function formatTime(time){
let minutes=Math.floor(time/60);
let seconds=Math.floor(time%60);
return minutes+":"+(seconds<10?"0":"")+seconds;
}

renderPlaylist();


const addBtn = document.getElementById("addBtn");
const fileInput = document.getElementById("fileInput");

addBtn.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", (e) => {

    const files = Array.from(e.target.files);

    files.forEach(file => {

        if (!file.type.includes("audio")) return;

        const reader = new FileReader();

        reader.onload = function(event) {

            const fullName = file.name.replace(".mp3", "");

            const newTrack = {
                name: fullName,
                file: event.target.result // base64
            };

            tracks.push(newTrack);
            saveTrackToDB(newTrack);
            renderPlaylist(searchInput.value);
        };

        reader.readAsDataURL(file);
    });

});

// ==========================
// DATABASE
// ==========================

let db;

const request = indexedDB.open("MusicDB", 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    db.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(e) {
    db = e.target.result;
    loadSavedTracks();
};

function saveTrackToDB(track) {
    const transaction = db.transaction(["tracks"], "readwrite");
    const store = transaction.objectStore("tracks");
    store.add(track);
}

function loadSavedTracks() {
    const transaction = db.transaction(["tracks"], "readonly");
    const store = transaction.objectStore("tracks");
    const request = store.getAll();

    request.onsuccess = function() {
        request.result.forEach(track => {
            tracks.push(track);
        });
        renderPlaylist();
    };
}

</script>
